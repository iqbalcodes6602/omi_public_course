name: Lint

on:
  pull_request:

env:
  GIT_USERNAME: ${{ github.actor }}
  GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  FIX_COMMIT_MESSAGE: Fixed /hook_tools/lint.py lints

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: true
      
      - name: Set base commit (pull request)
        run: |
          echo "GITHUB_BASE_COMMIT=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "GITHUB_CURRENT_COMMIT=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
        if: github.ref != 'refs/heads/main'

      - name: Set base commit (main)
        run: |
          echo "GITHUB_BASE_COMMIT=${{ github.event.before }}" >> $GITHUB_ENV
          echo "GITHUB_CURRENT_COMMIT=${{ github.event.after }}" >> $GITHUB_ENV
        if: github.ref == 'refs/heads/main'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      
      - name: Validate content structure
        run: |
          cd utils
          python validate_content.py
          
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: true

      - name: Pull container
        run: ./utils/lint --only-pull-image

      - name: Lint
        run: |
          COMMIT_MSG="$(git show ${{ github.event.pull_request.head.sha }} --format=%s --no-patch --no-color)"
          echo "Current commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == "${{ env.FIX_COMMIT_MESSAGE }}" ]]; then
            echo "Lint fix commit detected, only validating..."
            ./utils/lint \
              --command-name="utils/lint" \
              --diagnostics-output=github \
              validate --all
            exit 0
          fi

          echo "Running lint with auto-fix..."
          ./utils/lint \
            --command-name="utils/lint" \
            --diagnostics-output=github \
            fix --all && exit 0 || true

          echo "Lint fixes were found. Please run './utils/lint fix --all' locally and commit the changes."
          exit 1
